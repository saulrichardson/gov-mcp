name: Release Fixtures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build fixture bundle
        run: |
          tar -czf profiles-${{ github.event.workflow_run.head_sha }}.tgz profiles

      - name: Upload fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: profiles-${{ github.event.workflow_run.head_sha }}
          path: profiles-${{ github.event.workflow_run.head_sha }}.tgz
          if-no-files-found: error
