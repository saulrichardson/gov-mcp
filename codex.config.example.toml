# Codex runner configuration (only fields consumed by scripts/codex).

# Sandbox modes: danger-full-access | workspace-write | read-only
sandbox_mode = "danger-full-access"

# Approval policies: never | on-failure | on-request | untrusted
approval_policy = "never"

# Model used by @openai/codex-sdk.
model = "gpt-5.2"

# Reasoning effort: minimal | low | medium | high | xhigh
model_reasoning_effort = "xhigh"

[sandbox_workspace_write]
network_access = true

[features]
web_search_request = false
